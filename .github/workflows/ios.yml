name: CD — TestFlight (iOS)

on:
  push:
    tags:
      - 'ios-v*'
  workflow_dispatch:
    inputs:
      notes:
        description: 'Release notes for this build'
        required: false
        default: 'Manual build'

concurrency:
  group: ios-cd-testflight
  cancel-in-progress: false

env:
  GODOT_VERSION: "4.5.1"

jobs:
  deploy:
    name: Build & Deploy to TestFlight
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: false

      - name: Select Xcode 26.x
        run: |
          set -e
          PREFERRED_XCODE="/Applications/Xcode_26.2.app"
          FOUND_XCODE=""
          if [ -d "$PREFERRED_XCODE" ]; then
            FOUND_XCODE="$PREFERRED_XCODE"
          else
            MATCHES=$(ls -d /Applications/Xcode_26*.app 2>/dev/null || true)
            if [ -z "$MATCHES" ]; then
              echo "❌ No Xcode 26.x found"; exit 1
            fi
            FOUND_XCODE=$(echo "$MATCHES" | sort -V | tail -n1)
          fi
          sudo xcode-select -s "$FOUND_XCODE"
          xcodebuild -version

      # ---- GomokuNeural plugin build (GDExtension) ----
      # Runs BEFORE Godot import so the built xcframeworks are in
      # res://addons/gomoku_neural/ when Godot scans .gdextension files.

      - name: Set up Python 3.11 (for plugin SCons build)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install SCons + CoreML toolchain
        run: |
          set -e
          python3 -m pip install --upgrade pip scons
          # coremltools is only used to convert best_model.pt → mlpackage
          # for the L6 CNN. Pinned to the version that P2a verified against
          # torch 2.7; see .github/workflows/coreml-validate.yml.
          python3 -m pip install "torch==2.7.*" coremltools numpy

      - name: Cache godot-cpp
        id: cache-godot-cpp
        uses: actions/cache@v4
        with:
          path: ios_plugin/godot-cpp
          key: godot-cpp-4.5-ios-v2

      - name: Clone godot-cpp
        if: steps.cache-godot-cpp.outputs.cache-hit != 'true'
        run: |
          set -e
          cd ios_plugin
          git clone --depth=1 --branch=4.5 https://github.com/godotengine/godot-cpp.git godot-cpp

      - name: Build GomokuNeural plugin (xcframework)
        run: |
          set -e
          cd ios_plugin
          chmod +x build.sh
          ./build.sh

      - name: Stage plugin into addons/gomoku_neural/
        run: |
          set -e
          cp -R ios_plugin/build/libgomoku_neural.ios.template_release.xcframework \
                addons/gomoku_neural/
          cp -R ios_plugin/build/libgodot-cpp.ios.template_release.xcframework \
                addons/gomoku_neural/
          ls -la addons/gomoku_neural/

      # L6 needs big_iter_1 as a CoreML model. We convert on every build
      # (cheap, ~20s) rather than committing the mlmodelc since weights
      # can be bumped without re-committing a derived artifact.
      - name: Convert best_model.pt → GomokuNet.mlmodelc
        run: |
          set -e
          cd ai_server
          python3 export_coreml.py data/weights/best_model.pt \
              --filters 128 --blocks 6 \
              -o /tmp/GomokuNet.mlpackage
          # Pre-compile so the on-device first-launch load doesn't stall.
          xcrun coremlc compile /tmp/GomokuNet.mlpackage /tmp/
          ls -la /tmp/GomokuNet.mlmodelc | head -5
          du -sh /tmp/GomokuNet.mlmodelc

      - name: Cache Godot + export templates
        id: cache-godot
        uses: actions/cache@v4
        with:
          path: |
            ~/godot
            ~/Library/Application Support/Godot/export_templates
          key: godot-${{ env.GODOT_VERSION }}-ios-v1

      - name: Install Godot
        if: steps.cache-godot.outputs.cache-hit != 'true'
        run: |
          set -e
          mkdir -p ~/godot
          cd ~/godot
          GODOT_URL="https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_macos.universal.zip"
          curl -fsSL -o godot.zip "$GODOT_URL"
          unzip -q godot.zip
          chmod +x "Godot.app/Contents/MacOS/Godot"
          ln -sf "$HOME/godot/Godot.app/Contents/MacOS/Godot" "$HOME/godot/godot"
          ./godot --version

          TEMPLATES_URL="https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_export_templates.tpz"
          curl -fsSL -o templates.tpz "$TEMPLATES_URL"
          TEMPLATE_DIR="$HOME/Library/Application Support/Godot/export_templates/${GODOT_VERSION}.stable"
          mkdir -p "$TEMPLATE_DIR"
          unzip -q -o templates.tpz -d /tmp/godot_templates
          mv /tmp/godot_templates/templates/* "$TEMPLATE_DIR/"
          ls "$TEMPLATE_DIR" | head -5

      - name: Add Godot to PATH
        run: echo "$HOME/godot" >> "$GITHUB_PATH"

      - name: Godot import assets
        run: |
          set -e
          godot --headless --import --quit || true

      - name: Export iOS Xcode project
        run: |
          set -e
          mkdir -p build/ios
          godot --headless --export-release "iOS" build/ios/gomoku.ipa
          unzip -p build/ios/gomoku.ipa Payload/gomoku.app/gomoku.pck | strings | grep -q 'scripts/autoload/build_diagnostics.gdc'
          python3 ios_plugin/scripts/patch_ios_orientation.py build/ios
          python3 ios_plugin/scripts/patch_ios_orientation.py --validate build/ios
          ls -la build/ios/

      - name: Set up Ruby
        id: setup_ruby_early
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Inject CoreML model + framework into xcodeproj
        run: |
          set -e
          # fastlane's Gemfile already depends on xcodeproj; the
          # inject_coreml.rb script uses it to add GomokuNet.mlmodelc to
          # Copy Bundle Resources and link CoreML.framework. Running
          # BEFORE fastlane beta so xcodebuild archive picks everything up.
          bundle exec ruby ios_plugin/scripts/inject_coreml.rb \
              build/ios/gomoku.xcodeproj \
              /tmp/GomokuNet.mlmodelc

      - name: Validate signing secrets
        env:
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_KEYCHAIN_PASSWORD: ${{ secrets.MATCH_KEYCHAIN_PASSWORD }}
        run: |
          test -n "$MATCH_GIT_URL" || (echo "❌ Missing MATCH_GIT_URL"; exit 1)
          test -n "$MATCH_PASSWORD" || (echo "❌ Missing MATCH_PASSWORD"; exit 1)
          test -n "$MATCH_KEYCHAIN_PASSWORD" || (echo "❌ Missing MATCH_KEYCHAIN_PASSWORD"; exit 1)

      - name: Run Fastlane Beta
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_KEYCHAIN_PASSWORD: ${{ secrets.MATCH_KEYCHAIN_PASSWORD }}
        run: bundle exec fastlane beta

      - name: Validate final IPA orientation plist
        run: |
          set -e
          rm -rf /tmp/gomoku_ipa_check
          mkdir -p /tmp/gomoku_ipa_check
          unzip -q build/ios/gomoku.ipa -d /tmp/gomoku_ipa_check
          app_plist=$(find /tmp/gomoku_ipa_check/Payload -maxdepth 2 -name Info.plist | head -1)
          test -n "$app_plist"
          python3 ios_plugin/scripts/patch_ios_orientation.py --validate "$app_plist"

      - name: Upload IPA artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: gomoku-${{ github.ref_name }}
          path: build/ios/*.ipa
          retention-days: 30
