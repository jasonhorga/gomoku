name: CI — iOS plugin build (GDExtension + Swift)

# Builds the GomokuNeural GDExtension as xcframework. Uses godot-cpp
# (not raw godot source) to sidestep the generated-header dependency
# chain. Swift sources compile separately via swiftc then combine with
# the C++/Obj-C++ pieces via libtool.
#
# Currently returns a hardcoded (7,7) from Swift — no CoreML yet. A
# green CI proves the full Godot ↔ GDExtension ↔ Swift toolchain. CoreML
# loading + the ported MCTS are layered on top in subsequent phases.

on:
  push:
    branches:
      - swift-ml-plugin
    paths:
      - 'ios_plugin/**'
      - '.github/workflows/plugin-build.yml'
  workflow_dispatch:

concurrency:
  group: plugin-build-${{ github.ref }}
  cancel-in-progress: true

env:
  # Pin godot-cpp to the 4.5 branch line; it tracks ongoing fixes for
  # Godot 4.5.x releases (our runtime is 4.5.1). Tags like
  # godot-4.5-stable pin to the 4.5.0 release — we want the branch.
  GODOT_CPP_REF: "4.5"

jobs:
  build:
    name: Build xcframework (device + simulator)
    runs-on: macos-15
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: false

      - name: Select Xcode 26.x
        run: |
          set -e
          PREFERRED="/Applications/Xcode_26.2.app"
          if [ -d "$PREFERRED" ]; then
            sudo xcode-select -s "$PREFERRED"
          else
            MATCHES=$(ls -d /Applications/Xcode_26*.app 2>/dev/null || true)
            if [ -z "$MATCHES" ]; then
              echo "❌ No Xcode 26.x"
              exit 1
            fi
            sudo xcode-select -s "$(echo "$MATCHES" | sort -V | tail -n1)"
          fi
          xcodebuild -version

      - name: Set up Python 3.11 (for SCons)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install SCons
        run: python3 -m pip install --upgrade pip scons

      - name: Cache godot-cpp (source + built libs)
        id: cache-godot-cpp
        uses: actions/cache@v4
        with:
          path: |
            ios_plugin/godot-cpp
          key: godot-cpp-${{ env.GODOT_CPP_REF }}-ios-v2

      - name: Clone godot-cpp
        if: steps.cache-godot-cpp.outputs.cache-hit != 'true'
        run: |
          set -e
          cd ios_plugin
          git clone --depth=1 --branch="${GODOT_CPP_REF}" \
            https://github.com/godotengine/godot-cpp.git godot-cpp
          cd godot-cpp
          git submodule update --init --recursive --depth=1 || true
          du -sh .

      - name: Build plugin xcframework
        run: |
          set -e
          cd ios_plugin
          chmod +x build.sh
          ./build.sh

      - name: Upload plugin bundle
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: gomoku_neural_plugin
          path: |
            ios_plugin/build/libgomoku_neural.ios.template_release.xcframework
            ios_plugin/build/libgodot-cpp.ios.template_release.xcframework
            ios_plugin/build/gomoku_neural.gdextension
          retention-days: 30
