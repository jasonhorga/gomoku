name: CI — Gomoku plugin build (iOS + macOS GDExtension)

# Builds the GomokuNeural GDExtension for iOS (xcframework) and macOS
# (dylib). Uses godot-cpp (not raw godot source) to sidestep the
# generated-header dependency chain. Swift sources compile separately
# via swiftc then combine with the C++/Obj-C++ pieces.
#
# iOS slice ships to TestFlight via ios.yml.
# macOS slice ships via macos-cd.yml (wired in P3.3 of unification_plan).
# This workflow is a build-sanity check — green = both slices compile.

on:
  push:
    branches:
      - main
      - swift-ml-plugin
    paths:
      - 'ios_plugin/**'
      - 'addons/gomoku_neural/gomoku_neural.gdextension'
      - '.github/workflows/plugin-build.yml'
  workflow_dispatch:

concurrency:
  group: plugin-build-${{ github.ref }}
  cancel-in-progress: true

env:
  # Pin godot-cpp to the 4.5 branch line; it tracks ongoing fixes for
  # Godot 4.5.x releases (our runtime is 4.5.1). Tags like
  # godot-4.5-stable pin to the 4.5.0 release — we want the branch.
  GODOT_CPP_REF: "4.5"

jobs:
  build:
    name: Build plugin (${{ matrix.platform }})
    runs-on: macos-15
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        platform: [ios, macos]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: false

      - name: Select Xcode 26.x
        run: |
          set -e
          PREFERRED="/Applications/Xcode_26.2.app"
          if [ -d "$PREFERRED" ]; then
            sudo xcode-select -s "$PREFERRED"
          else
            MATCHES=$(ls -d /Applications/Xcode_26*.app 2>/dev/null || true)
            if [ -z "$MATCHES" ]; then
              echo "❌ No Xcode 26.x"
              exit 1
            fi
            sudo xcode-select -s "$(echo "$MATCHES" | sort -V | tail -n1)"
          fi
          xcodebuild -version

      - name: Set up Python 3.11 (for SCons)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install SCons
        run: python3 -m pip install --upgrade pip scons

      - name: Cache godot-cpp (source + built libs)
        id: cache-godot-cpp
        uses: actions/cache@v4
        with:
          path: |
            ios_plugin/godot-cpp
          # Separate cache per platform — the bin/ layout differs (ios vs
          # macos prebuilt libs) and sharing caused false cache hits in
          # earlier runs.
          key: godot-cpp-${{ env.GODOT_CPP_REF }}-${{ matrix.platform }}-v3

      - name: Clone godot-cpp
        if: steps.cache-godot-cpp.outputs.cache-hit != 'true'
        run: |
          set -e
          cd ios_plugin
          git clone --depth=1 --branch="${GODOT_CPP_REF}" \
            https://github.com/godotengine/godot-cpp.git godot-cpp
          cd godot-cpp
          git submodule update --init --recursive --depth=1 || true
          du -sh .

      - name: Build plugin
        run: |
          set -e
          cd ios_plugin
          chmod +x build.sh
          ./build.sh ${{ matrix.platform }}

      - name: Upload plugin bundle (iOS)
        if: success() && matrix.platform == 'ios'
        uses: actions/upload-artifact@v4
        with:
          name: gomoku_neural_plugin_ios
          path: |
            ios_plugin/build/libgomoku_neural.ios.template_release.xcframework
            ios_plugin/build/libgodot-cpp.ios.template_release.xcframework
            ios_plugin/build/gomoku_neural.gdextension
          retention-days: 30

      - name: Upload plugin bundle (macOS)
        if: success() && matrix.platform == 'macos'
        uses: actions/upload-artifact@v4
        with:
          name: gomoku_neural_plugin_macos
          path: |
            ios_plugin/build/libgomoku_neural.macos.template_release.dylib
            ios_plugin/build/gomoku_neural.gdextension
          retention-days: 30
